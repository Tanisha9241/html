<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Registration Form</h1>
    <form>
        <label for="username">Name</label>
        <input type="text" name="username" id="username" placeholder="Enter your name"><br><br>
        <label for="Father's Name" name="Father's Name">Father's Name</label>
        <input type="text" name="Father's Name" id="Father's Name"><br><br>
        <label for="Father's Name" name="Father's Name">Mother's Name</label>
        <input type="text" name="Father's Name" id="Mother's Name"><br><br>
        <label for="email" name="email">Email</label>
        <input type="email" name="email" id="email" placeholder="Enter your Email id"><br><br>
        <label for="Date of Birth" name="Date of birth">Date of birth</label>
        <input type="date" name="Date of Birth" id="Date of Birth"><br><br>
        <label for="Number" name="Number">Mob No:</label>
        <input type="number" name="Number" id="Number" placeholder="Enter your phone number"><br><br>
        <label for="Course" name="Course">Course</label>
        <select name="Course" id="Course" required="true">
            <option value="MCA">MCA</option>
            <option value="MBA">MBA</option>
            <option value="BCA">BCA</option>
            <option value="BBA">BBA</option>
            <option value="BA LLB">BA LLB</option>
            <option value="LLB">LLB</option>
        </select><br><br>
        <label for="gender">Select your Gender:</label><br>
        <label><input type="radio" name="gender" value="Male">Male</label>
        <label><input type="radio" name="gender" value="Female">Female</label>
        <label><input type="radio" name="gender" value="Other">Other</label><br><br>
        <label for="Qualification" name="Qualification">Qualification</label>
        <select name="Qualification" id="Qualification">
            <option value="10">10th</option>
            <option value="12">12th</option>
            <option value="Graduation">Graduation</option>
        </select><br><br>
        <button type="Submit">Submit</button>
        <button type="reset">Clear Form</button>





    </form>
</body>
</html>
